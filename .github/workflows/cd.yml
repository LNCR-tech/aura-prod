name: CD

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  # ===========================================================================
  # CD — build production Docker images and deploy
  # Only runs after CI completes successfully on push to main
  # ===========================================================================

  docker-build:
    name: Docker Build Test
    runs-on: ubuntu-latest
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push'
    steps:
      - uses: actions/checkout@v4
      - name: Create CI env files
        run: |
          cp backend/.env.example backend/.env
          cp frontend/.env.example frontend/.env
          cp assistant/.env.example assistant/.env
          cp database/.env.example database/.env
      - name: Build production images
        run: docker compose -f docker-compose.prod.yml build

  # ===========================================================================
  # Deploy to production server
  # Required GitHub secrets:
  #   SERVER_HOST    — server IP or hostname
  #   SERVER_PORT    — SSH port (e.g. 22)
  #   SERVER_USER    — SSH login user (e.g. ubuntu)
  #   SERVER_SSH_KEY — private SSH key (PEM format)
  #   SERVER_APP_DIR — absolute path on server (e.g. /opt/aura)
  # ===========================================================================

  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [docker-build]
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          port: ${{ secrets.SERVER_PORT }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e
            cd ${{ secrets.SERVER_APP_DIR }}
            git fetch origin main
            git reset --hard origin/main
            docker compose -f docker-compose.prod.yml build --pull
            docker compose -f docker-compose.prod.yml up -d --remove-orphans
            docker image prune -f
