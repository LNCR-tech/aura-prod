name: CI/CD

on:
  push:
    branches:
      - integrate/pilot-merge
  pull_request:
    branches:
      - integrate/pilot-merge

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  # ===========================================================================
  # CI — runs on every push and PR
  # ===========================================================================

  compose-config:
    name: Validate Compose
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create CI env file
        run: cp .env.example .env
      - name: Check for unresolved merge conflicts
        run: |
          if grep -R -n -E '^(<<<<<<<|>>>>>>>|=======$)' . \
            --exclude-dir=.git \
            --exclude='.env' \
            --exclude='.env.example'; then
            echo "Unresolved merge conflict markers found."
            exit 1
          fi
      - name: Validate local compose config
        run: docker compose config --quiet
      - name: Validate production compose config
        run: docker compose -f docker-compose.prod.yml config --quiet

  backend-checks:
    name: Backend Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Compile Python sources
        run: python -m compileall backend assistant

  frontend-checks:
    name: Frontend Checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend deps
        run: npm ci
      - name: Build frontend
        run: npm run build

  docker-build:
    name: Docker Build Test
    runs-on: ubuntu-latest
    needs: [compose-config, backend-checks, frontend-checks]
    steps:
      - uses: actions/checkout@v4
      - name: Create CI env file
        run: cp .env.example .env
      - name: Build production images
        run: docker compose -f docker-compose.prod.yml build

