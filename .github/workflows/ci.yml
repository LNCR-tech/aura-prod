name: CI/CD

on:
  push:
    branches:
      - main
      - master
      - integrate/pilot-merge
      - Pre-Production-v1
      - aura_ci_cd
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  # ===========================================================================
  # CI — runs on every push and PR
  # ===========================================================================

  compose-config:
    name: Validate Compose
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create CI env file
        run: cp .env.example .env
      - name: Check for unresolved merge conflicts
        run: |
          if grep -R -n -E '^(<<<<<<<|>>>>>>>|=======$)' . \
            --exclude-dir=.git \
            --exclude='.env' \
            --exclude='.env.example'; then
            echo "Unresolved merge conflict markers found."
            exit 1
          fi
      - name: Validate local compose config
        run: docker compose config --quiet
      - name: Validate production compose config
        run: docker compose -f docker-compose.prod.yml config --quiet

  backend-checks:
    name: Backend Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Compile Python sources
        run: python -m compileall backend assistant

  frontend-checks:
    name: Frontend Checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend deps
        run: npm ci
      - name: Build frontend
        run: npm run build

  docker-build:
    name: Docker Build Test
    runs-on: ubuntu-latest
    needs: [compose-config, backend-checks, frontend-checks]
    steps:
      - uses: actions/checkout@v4
      - name: Create CI env file
        run: cp .env.example .env
      - name: Build production images
        run: docker compose -f docker-compose.prod.yml build

  # ===========================================================================
  # CD — deploy to AWS (only on push to deploy branches, never on PRs)
  # ===========================================================================

  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.event_name == 'push'
    environment: production
    concurrency:
      group: deploy-production
      cancel-in-progress: false

    steps:
      - name: Verify deploy secrets
        run: |
          missing=""
          [ -z "${{ secrets.AWS_HOST }}" ] && missing="$missing AWS_HOST"
          [ -z "${{ secrets.AWS_USER }}" ] && missing="$missing AWS_USER"
          [ -z "${{ secrets.AWS_SSH_PRIVATE_KEY }}" ] && missing="$missing AWS_SSH_PRIVATE_KEY"
          [ -z "${{ secrets.AWS_PROJECT_PATH }}" ] && missing="$missing AWS_PROJECT_PATH"
          if [ -n "$missing" ]; then
            echo "Missing secrets:$missing"
            echo "Add them at: Settings → Secrets → Actions"
            exit 1
          fi
          echo "All deploy secrets present."

      - name: Deploy through SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.AWS_HOST }}
          username: ${{ secrets.AWS_USER }}
          key: ${{ secrets.AWS_SSH_PRIVATE_KEY }}
          port: 22
          command_timeout: 10m
          script: |
            set -euo pipefail
            DEPLOY_DIR="${{ secrets.AWS_PROJECT_PATH }}"
            COMPOSE_FILE="docker-compose.prod.yml"
            BRANCH="${{ github.ref_name }}"

            echo "=== Aura CD — deploying $BRANCH ==="

            cd "$DEPLOY_DIR"

            # Force-sync to match GitHub exactly (no merge conflicts)
            echo ">>> Syncing code..."
            git fetch origin "$BRANCH"
            git checkout "$BRANCH"
            git reset --hard "origin/$BRANCH"

            # Validate compose before starting
            echo ">>> Validating compose config..."
            docker compose -f "$COMPOSE_FILE" config --quiet

            # Rebuild and restart (volumes are preserved — data is safe)
            echo ">>> Rebuilding and restarting stack..."
            docker compose -f "$COMPOSE_FILE" up --build -d

            # Wait for backend health
            echo ">>> Waiting for backend health check..."
            for i in $(seq 1 30); do
              if curl -sf http://localhost:8000/health > /dev/null 2>&1; then
                echo ">>> Backend is healthy!"
                break
              fi
              if [ "$i" -eq 30 ]; then
                echo ">>> Backend health check timed out after 60s"
                echo ">>> Check logs: docker compose -f $COMPOSE_FILE logs backend"
                exit 1
              fi
              sleep 2
            done

            # Clean up old dangling images to save disk space
            echo ">>> Cleaning up old images..."
            docker image prune -f

            # Show running containers
            docker ps --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"

            echo "=== Deploy complete ==="
