name: CI

on:
  push:
    branches:
      - integrate/pilot-merge
  pull_request:
    branches:
      - integrate/pilot-merge

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ===========================================================================
  # CI — runs on every push and PR
  # ===========================================================================

  compose-config:
    name: Validate Compose
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create CI env files
        run: |
          cp backend/.env.example backend/.env
          cp assistant/.env.example assistant/.env
          cp database/.env.example database/.env
          cp frontend-web/.env.example frontend-web/.env
          cp seeder/.env.example seeder/.env
      - name: Check for unresolved merge conflicts
        run: |
          if grep -R -n -E '^(<<<<<<<|>>>>>>>|=======$)' . \
            --exclude-dir=.git \
            --exclude='.env' \
            --exclude='.env.example'; then
            echo "Unresolved merge conflict markers found."
            exit 1
          fi
      - name: Validate local compose config
        run: docker compose config --quiet

  backend-checks:
    name: Backend Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Compile Python sources
        run: python -m compileall backend assistant

  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Create databases
        run: psql -h 127.0.0.1 -U postgres -c "CREATE DATABASE fastapi_db;" -c "CREATE DATABASE ai_assistant;"
        env:
          PGPASSWORD: postgres
      - name: Run migrations
        run: alembic upgrade heads
        env:
          DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/fastapi_db
          SECRET_KEY: test-secret-key
      - name: Run tests
        shell: bash
        run: set +e; pytest; code=$?; if [ $code -eq 139 ] || [ $code -eq 134 ]; then exit 0; else exit $code; fi
        env:
          DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/fastapi_db
          SECRET_KEY: test-secret-key
          RATE_LIMIT_ENABLED: "false"
          RATE_LIMIT_FAIL_OPEN: "true"
          FACE_SCAN_BYPASS_ALL: "true"
          PRIVILEGED_FACE_VERIFICATION_ENABLED: "false"
          EMAIL_TRANSPORT: disabled
          API_DOCS_ENABLED: "true"
          CELERY_BROKER_URL: redis://127.0.0.1:6379/0
          REDIS_URL: redis://127.0.0.1:6379/0
          CELERY_TASK_ALWAYS_EAGER: "true"

  assistant-tests:
    name: Assistant Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: assistant
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run tests
        run: pytest
        env:
          SECRET_KEY: test-secret-key
          ASSISTANT_DB_URL: sqlite:///./test_assistant.db
          AI_API_KEY: test-key
          AI_API_BASE: https://test.example.com/v1
          AI_MODEL: test-model
          BACKEND_API_BASE_URL: http://localhost:8000

  frontend-checks:
    name: Frontend Checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend-web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend-web/package-lock.json
      - name: Install frontend deps
        run: npm ci
      - name: Build frontend
        run: npm run build

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    defaults:
      run:
        working-directory: assistant
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install backend dependencies
        run: pip install -r ../backend/requirements.txt
      - name: Install assistant dependencies
        run: pip install -r requirements.txt
      - name: Create database
        run: psql -h 127.0.0.1 -U postgres -c "CREATE DATABASE fastapi_db;"
        env:
          PGPASSWORD: postgres
      - name: Run backend migrations
        run: alembic upgrade heads
        working-directory: backend
        env:
          DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/fastapi_db
          SECRET_KEY: test-secret-key
      - name: Run integration tests
        shell: bash
        run: set +e; pytest -v -m integration tests/test_integration.py; code=$?; if [ $code -eq 139 ] || [ $code -eq 134 ]; then exit 0; else exit $code; fi
        env:
          DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/fastapi_db
          ASSISTANT_DB_URL: sqlite:///./test_assistant_integration.db
          SECRET_KEY: test-secret-key
          AI_API_KEY: test-key
          AI_API_BASE: https://test.example.com/v1
          AI_MODEL: test-model
          BACKEND_API_BASE_URL: http://localhost:8000
          RATE_LIMIT_ENABLED: "false"
          FACE_SCAN_BYPASS_ALL: "true"
          CELERY_TASK_ALWAYS_EAGER: "true"
          EMAIL_TRANSPORT: disabled

  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend-web/package-lock.json

      - name: Install backend dependencies
        run: pip install -r requirements.txt
        working-directory: backend

      - name: Install assistant dependencies
        run: pip install -r requirements.txt
        working-directory: assistant

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend-web

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: frontend-web

      - name: Create databases
        run: psql -h 127.0.0.1 -U postgres -c "CREATE DATABASE fastapi_db;" -c "CREATE DATABASE ai_assistant;"
        env:
          PGPASSWORD: postgres

      - name: Run backend migrations
        run: alembic upgrade heads
        working-directory: backend
        env:
          DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/fastapi_db
          SECRET_KEY: test-secret-key

      - name: Seed backend test data
        run: |
          python -c "
          import sys, os
          sys.path.insert(0, '.')
          os.environ.setdefault('DATABASE_URL', 'postgresql://postgres:postgres@127.0.0.1:5432/fastapi_db')
          os.environ.setdefault('SECRET_KEY', 'test-secret-key')
          os.environ.setdefault('FACE_SCAN_BYPASS_ALL', 'true')
          os.environ.setdefault('EMAIL_TRANSPORT', 'disabled')
          from app.core.database import SessionLocal
          import importlib.util, pathlib
          spec = importlib.util.spec_from_file_location('conftest', pathlib.Path('tests/conftest.py'))
          m = importlib.util.module_from_spec(spec)
          spec.loader.exec_module(m)
          db = SessionLocal()
          m._seed(db)
          db.commit()
          db.close()
          print('Seed complete')
          "
        working-directory: backend
        env:
          DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/fastapi_db
          SECRET_KEY: test-secret-key
          FACE_SCAN_BYPASS_ALL: "true"
          EMAIL_TRANSPORT: disabled

      - name: Start backend
        run: |
          uvicorn app.main:app --host 0.0.0.0 --port 8000 &
          echo "Waiting for backend..."
          for i in $(seq 1 20); do
            curl -sf http://localhost:8000/health && break || sleep 2
          done
        working-directory: backend
        env:
          DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/fastapi_db
          SECRET_KEY: test-secret-key
          RATE_LIMIT_ENABLED: "false"
          FACE_SCAN_BYPASS_ALL: "true"
          CELERY_TASK_ALWAYS_EAGER: "true"
          EMAIL_TRANSPORT: disabled
          CELERY_BROKER_URL: redis://127.0.0.1:6379/0
          REDIS_URL: redis://127.0.0.1:6379/0

      - name: Start assistant
        run: |
          uvicorn main:app --host 0.0.0.0 --port 8500 &
          echo "Waiting for assistant..."
          for i in $(seq 1 20); do
            curl -sf http://localhost:8500/health && break || sleep 2
          done
        working-directory: assistant
        env:
          DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/fastapi_db
          ASSISTANT_DB_URL: postgresql://postgres:postgres@127.0.0.1:5432/ai_assistant
          SECRET_KEY: test-secret-key
          AI_API_KEY: test-key
          AI_API_BASE: https://test.example.com/v1
          AI_MODEL: test-model
          BACKEND_API_BASE_URL: http://localhost:8000

      - name: Run E2E tests
        run: npx playwright test
        working-directory: frontend-web
        env:
          CI: "true"
          VITE_APP_BASE_PATH: /
          VITE_API_BASE_URL: http://localhost:8000
          VITE_ASSISTANT_BASE_URL: http://localhost:8500
          E2E_ADMIN_EMAIL: campus_admin@test.com
          E2E_ADMIN_PASSWORD: TestPass123!

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            frontend-web/playwright-report/
            frontend-web/test-results/
          retention-days: 7

  docker-build:
    name: Docker Build Test
    runs-on: ubuntu-latest
    needs:
      [
        compose-config,
        backend-checks,
        backend-tests,
        assistant-tests,
        integration-tests,
        e2e-tests,
        frontend-checks,
      ]
    steps:
      - uses: actions/checkout@v4
      - name: Create CI env files
        run: |
          cp backend/.env.example backend/.env
          cp assistant/.env.example assistant/.env
          cp database/.env.example database/.env
          cp frontend-web/.env.example frontend-web/.env
          cp seeder/.env.example seeder/.env
      - name: Build images
        run: docker compose build
