name: CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  # ===========================================================================
  # CI — runs on every push and PR
  # ===========================================================================

  compose-config:
    name: Validate Compose
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create CI env files
        run: |
          cp backend/.env.example backend/.env
          cp frontend/.env.example frontend/.env
          cp assistant/.env.example assistant/.env
          cp database/.env.example database/.env
      - name: Check for unresolved merge conflicts
        run: |
          if grep -R -n -E '^(<<<<<<<|>>>>>>>|=======$)' . \
            --exclude-dir=.git \
            --exclude='.env' \
            --exclude='.env.example'; then
            echo "Unresolved merge conflict markers found."
            exit 1
          fi
      - name: Validate local compose config
        run: docker compose config --quiet
      - name: Validate production compose config
        run: docker compose -f docker-compose.prod.yml config --quiet

  backend-checks:
    name: Backend Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Compile Python sources
        run: python -m compileall backend assistant

  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Create databases
        run: psql -h 127.0.0.1 -U postgres -c "CREATE DATABASE fastapi_db;" -c "CREATE DATABASE ai_assistant;"
        env:
          PGPASSWORD: postgres
      - name: Run migrations
        run: alembic upgrade heads
        env:
          DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/fastapi_db
          SECRET_KEY: test-secret-key
      - name: Run tests
        run: |
          set +e
          pytest 2>&1 | tee pytest_output.txt
          code=$?
          if [ $code -ne 0 ]; then
            if grep -qE '[0-9]+ passed' pytest_output.txt && ! grep -qE '[0-9]+ failed' pytest_output.txt; then
              echo "::warning::pytest exited with code $code (likely post-test segfault), but all tests passed."
              exit 0
            fi
            exit $code
          fi
        env:
          DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/fastapi_db
          SECRET_KEY: test-secret-key
          RATE_LIMIT_ENABLED: "false"
          RATE_LIMIT_FAIL_OPEN: "true"
          FACE_SCAN_BYPASS_ALL: "true"
          PRIVILEGED_FACE_VERIFICATION_ENABLED: "false"
          EMAIL_TRANSPORT: disabled
          API_DOCS_ENABLED: "true"

  assistant-tests:
    name: Assistant Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: assistant
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run tests
        run: pytest
        env:
          SECRET_KEY: test-secret-key
          ASSISTANT_DB_URL: sqlite:///./test_assistant.db
          AI_API_KEY: test-key
          AI_API_BASE: https://test.example.com/v1
          AI_MODEL: test-model
          BACKEND_API_BASE_URL: http://localhost:8000

  frontend-checks:
    name: Frontend Checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend deps
        run: npm ci
      - name: Build frontend
        run: npm run build

  # ===========================================================================
  # CD — build and deploy (only on push to main, after all CI jobs pass)
  # ===========================================================================

  docker-build:
    name: Docker Build Test
    runs-on: ubuntu-latest
    needs: [compose-config, backend-checks, backend-tests, assistant-tests, frontend-checks]
    steps:
      - uses: actions/checkout@v4
      - name: Create CI env files
        run: |
          cp backend/.env.example backend/.env
          cp frontend/.env.example frontend/.env
          cp assistant/.env.example assistant/.env
          cp database/.env.example database/.env
      - name: Build production images
        run: docker compose -f docker-compose.prod.yml build

  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [docker-build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PROD_SSH_HOST }}
          port: ${{ secrets.SERVER_PORT }}
          username: ${{ secrets.PROD_SSH_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            set -e
            cd ${{ secrets.PROD_APP_DIR }}
            # Back up existing .env files before reset
            for svc in backend frontend assistant database; do
              if [ -f "$svc/.env" ]; then
                cp "$svc/.env" "/tmp/${svc}_env_backup"
              fi
            done
            git fetch origin main
            git reset --hard origin/main
            # Restore .env files (or create from .env.example)
            for svc in backend frontend assistant database; do
              if [ -f "/tmp/${svc}_env_backup" ]; then
                cp "/tmp/${svc}_env_backup" "$svc/.env"
                rm "/tmp/${svc}_env_backup"
              elif [ -f "$svc/.env.example" ]; then
                cp "$svc/.env.example" "$svc/.env"
              fi
            done
            docker compose -f docker-compose.prod.yml build --pull
            docker compose -f docker-compose.prod.yml up -d --remove-orphans
            docker image prune -f

