name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  compose-config:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Prepare env file
        run: cp .env.example .env
      - name: Validate local compose config
        run: docker compose config --quiet
      - name: Validate production compose config
        run: docker compose -f docker-compose.prod.yml config --quiet

  backend-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install backend test deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest==9.0.3 httpx==0.27.2 email_validator==2.3.0 python-dotenv==1.2.2
      - name: Compile Python sources
        run: python -m compileall Backend Assistant
      - name: Run targeted backend tests
        env:
          PYTHONPATH: Backend
        run: python -m pytest -q Backend/app/tests/test_config.py Backend/app/tests/test_email_service.py

  frontend-checks:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: Frontend/package-lock.json
      - name: Install frontend deps
        run: npm ci
      - name: Lint frontend
        run: npm run lint
      - name: Run frontend smoke tests
        run: npm run test
      - name: Build frontend
        run: npm run build
