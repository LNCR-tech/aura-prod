name: CI/CD

on:
  push:
    branches:
      - main
      - master
      - integrate/pilot-merge
      - Pre-Production-v1
  pull_request:

jobs:

  # ===========================================================================
  # CI — runs on every push and PR
  # ===========================================================================

  compose-config:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Prepare env file
        run: cp .env .env
      - name: Validate local compose config
        run: docker compose config --quiet
      - name: Validate production compose config
        run: docker compose -f docker-compose.prod.yml config --quiet

  backend-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Compile Python sources
        run: python -m compileall Backend Assistant

  frontend-checks:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: Frontend/package-lock.json
      - name: Install frontend deps
        run: npm ci
      - name: Lint frontend
        run: npm run lint
      - name: Run frontend smoke tests
        run: npm run test
      - name: Build frontend
        run: npm run build

  # ===========================================================================
  # CD — deploy to AWS (only on push to deploy branches, never on PRs)
  # ===========================================================================

  deploy:
    runs-on: ubuntu-latest
    needs: [compose-config, backend-checks, frontend-checks]
    if: github.event_name == 'push'
    environment: production
    concurrency:
      group: deploy-production
      cancel-in-progress: false

    steps:
      - name: Deploy to AWS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.AWS_HOST }}
          username: ${{ secrets.AWS_USER }}
          key: ${{ secrets.AWS_SSH_PRIVATE_KEY }}
          port: ${{ secrets.AWS_SSH_PORT || 22 }}
          script_stop: true
          command_timeout: 10m
          script: |
            set -euo pipefail
            DEPLOY_DIR="${{ secrets.AWS_PROJECT_PATH || '/opt/aura' }}"
            COMPOSE_FILE="docker-compose.prod.yml"
            BRANCH="${{ github.ref_name }}"

            echo "=== Aura CD — deploying $BRANCH ==="

            cd "$DEPLOY_DIR"

            # Pull latest code
            echo ">>> Pulling latest code..."
            git fetch origin
            git checkout "$BRANCH"
            git pull origin "$BRANCH"

            # Rebuild and restart (volumes are preserved — data is safe)
            # --build   = rebuild images with new code
            # -d        = detached mode
            # NO -v     = volumes (database, uploads, models) are never deleted
            echo ">>> Rebuilding and restarting stack..."
            docker compose -f "$COMPOSE_FILE" up --build -d

            # Wait for backend health
            echo ">>> Waiting for backend health check..."
            for i in $(seq 1 30); do
              if curl -sf http://localhost:8000/health > /dev/null 2>&1; then
                echo ">>> Backend is healthy!"
                break
              fi
              if [ "$i" -eq 30 ]; then
                echo ">>> WARNING: Backend health check timed out after 60s"
                echo ">>> Check logs: docker compose -f $COMPOSE_FILE logs backend"
                exit 1
              fi
              sleep 2
            done

            # Clean up old dangling images to save disk space
            echo ">>> Cleaning up old images..."
            docker image prune -f

            echo "=== Deploy complete ==="
