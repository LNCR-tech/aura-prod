name: Aura Backend CI/CD

on:
  push:
    branches:
      - integrate/pilot-merge
  pull_request:
    branches:
      - integrate/pilot-merge
  workflow_dispatch:

jobs:
  validate-compose:
    name: Validate Docker (Backend Only)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Check for merge conflicts
        run: |
          if grep -R "<<<<<<<\|=======\|>>>>>>>" . --exclude-dir=.git; then
            echo "Merge conflict markers found!"
            exit 1
          fi

      - name: Validate docker-compose
        run: docker compose -f docker-compose.prod.yml config --quiet

  backend-checks:
    name: Backend Checks
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest httpx email-validator python-dotenv

      - name: Compile backend
        run: python -m compileall .

      - name: Run tests
        env:
          PYTHONPATH: ${{ github.workspace }}/backend
          SECRET_KEY: ci-secret
          DATABASE_URL: sqlite:///./test.db
        run: |
          if [ -d app/tests ]; then
            pytest -q app/tests
          else
            echo "No tests found, skipping"
          fi

  docker-build:
    name: Build Backend + DB
    runs-on: ubuntu-latest
    needs:
      - validate-compose
      - backend-checks

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Create env file
        run: cp .env.example .env

      - name: Build backend + database containers
        run: docker compose -f docker-compose.prod.yml build

  deploy:
    name: Deploy Backend Only
    runs-on: ubuntu-latest
    needs: docker-build

    if: github.ref == 'refs/heads/integrate/pilot-merge'

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            set -e

            APP_DIR="${{ secrets.SERVER_APP_DIR }}"
            REPO_URL="https://github.com/LNCR-tech/RIZAL_v1.git"
            BRANCH="integrate/pilot-merge"

            if [ ! -d "$APP_DIR/.git" ]; then
              mkdir -p "$APP_DIR"
              git clone -b "$BRANCH" "$REPO_URL" "$APP_DIR"
            fi

            cd "$APP_DIR"

            git fetch origin "$BRANCH"
            git reset --hard "origin/$BRANCH"

            cp .env.production .env

            # ONLY backend + db
            docker compose -f docker-compose.prod.yml up -d backend db --build

            docker image prune -f
