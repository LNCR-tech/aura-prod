name: Aura CI/CD

on:
  push:
    branches:
      - main
      - master
      - integrate/pilot-merge
  pull_request:
    branches:
      - main
      - master
      - integrate/pilot-merge
  workflow_dispatch:

jobs:
  validate-compose:
    name: Validate Docker Compose
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Create CI env file
        run: cp .env.example .env

      - name: Check for unresolved merge conflicts
        run: |
          if grep -R "<<<<<<<\|=======\|>>>>>>>" . --exclude-dir=.git; then
            echo "Unresolved merge conflict markers found."
            exit 1
          fi

      - name: Validate local compose
        run: docker compose config --quiet

      - name: Validate production compose
        run: docker compose -f docker-compose.prod.yml config --quiet

  backend-checks:
    name: Backend Checks
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install pytest httpx email-validator python-dotenv

      - name: Compile backend Python files
        run: python -m compileall .

      - name: Run backend tests
        env:
          PYTHONPATH: ${{ github.workspace }}/backend
          SECRET_KEY: ci-test-secret
          DATABASE_URL: sqlite:///./ci_test.db
        run: |
          if [ -d app/tests ]; then
            pytest -q app/tests
          else
            echo "No backend tests found. Skipping."
          fi

  assistant-checks:
    name: Assistant Checks
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: assistant-v2

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install assistant dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Compile assistant Python files
        run: python -m compileall .

  frontend-checks:
    name: Frontend Checks
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Lint frontend
        run: npm run lint --if-present

      - name: Test frontend
        run: npm run test --if-present

      - name: Build frontend
        run: npm run build

  docker-build:
    name: Docker Build Smoke Test
    runs-on: ubuntu-latest
    needs:
      - validate-compose
      - backend-checks
      - assistant-checks
      - frontend-checks

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Create CI env file
        run: cp .env.example .env

      - name: Build production images
        run: docker compose -f docker-compose.prod.yml build

  deploy-production:
    name: Deploy to Ubuntu Server
    runs-on: ubuntu-latest
    needs: docker-build

    if: github.ref == 'refs/heads/integrate/pilot-merge'

    steps:
      - name: Deploy through SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            cd ${{ secrets.SERVER_APP_DIR }}
            git fetch origin
            git checkout integrate/pilot-merge
            git pull origin integrate/pilot-merge
            cp .env.production .env
            docker compose -f docker-compose.prod.yml up -d --build
            docker image prune -f
