# =============================================================================
# Aura — Production Compose (AWS Ubuntu)
# Zero-config: ./start.sh is all you need on a fresh server.
# All services start automatically in the correct order.
# =============================================================================

# ---------------------------------------------------------------------------
# Shared fragments (YAML anchors to eliminate duplication)
# ---------------------------------------------------------------------------

x-backend-env: &backend-env
  DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@db:5432/${DB_NAME:-fastapi_db}
  CELERY_BROKER_URL: redis://redis:6379/0
  CELERY_RESULT_BACKEND: redis://redis:6379/0
  SECRET_KEY: ${SECRET_KEY:-change-this-in-production}

x-backend-volumes: &backend-volumes
  - import_storage:/app/storage/imports
  - branding_storage:/app/storage/school_logos
  - insightface_models:/home/appuser/.insightface

x-depends-infra: &depends-infra
  db:
    condition: service_healthy
  redis:
    condition: service_started

services:

  # ---------------------------------------------------------------------------
  # Infrastructure
  # ---------------------------------------------------------------------------

  db:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-fastapi_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker-init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-fastapi_db}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Init jobs — run once in order, then exit
  # ---------------------------------------------------------------------------

  migrate:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    image: aura-backend:prod
    command: alembic upgrade heads
    environment:
      <<: *backend-env
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  bootstrap:
    image: aura-backend:prod
    command: python bootstrap.py
    environment:
      <<: *backend-env
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: "no"

  # ---------------------------------------------------------------------------
  # Application services
  # ---------------------------------------------------------------------------

  backend:
    image: aura-backend:prod
    ports:
      - "8000:8000"
    env_file: ./.env
    environment:
      <<: *backend-env
      UVICORN_WORKERS: ${UVICORN_WORKERS:-2}
    volumes: *backend-volumes
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s
    restart: unless-stopped
    depends_on:
      <<: *depends-infra
      bootstrap:
        condition: service_completed_successfully

  worker:
    image: aura-backend:prod
    command: celery -A app.workers.celery_app.celery_app worker --loglevel=info
    env_file: ./.env
    environment:
      <<: *backend-env
    volumes: *backend-volumes
    restart: unless-stopped
    depends_on: *depends-infra

  beat:
    image: aura-backend:prod
    command: celery -A app.workers.celery_app.celery_app beat --loglevel=info
    env_file: ./.env
    environment:
      <<: *backend-env
    restart: unless-stopped
    depends_on: *depends-infra

  assistant:
    build: ./assistant-v2
    image: aura-assistant:prod
    ports:
      - "8500:8500"
    env_file: ./.env
    environment:
      APP_DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@db:5432/${DB_NAME:-fastapi_db}
      ASSISTANT_DB_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@db:5432/ai_assistant
      SECRET_KEY: ${SECRET_KEY:-change-this-in-production}
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: /__backend__
    image: aura-frontend:prod
    ports:
      - "80:80"
    environment:
      BACKEND_ORIGIN: ${BACKEND_ORIGIN:-http://backend:8000}
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres_data:
  import_storage:
  branding_storage:
  insightface_models:
