services:
  db:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-fastapi_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-fastapi_db}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --save 60 1 --loglevel warning
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./Backend
      dockerfile: Dockerfile.prod
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:postgres@db:5432/fastapi_db}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/0}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis:6379/0}
      LOGIN_URL: ${LOGIN_URL:-http://localhost}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost}
      UVICORN_WORKERS: ${UVICORN_WORKERS:-2}
      SCHOOL_LOGO_STORAGE_DIR: /tmp/valid8_school_logos
      IMPORT_STORAGE_DIR: /tmp/valid8_imports
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    expose:
      - "8000"
    volumes:
      - import_storage:/tmp/valid8_imports
      - branding_storage:/tmp/valid8_school_logos
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/', timeout=3)",
        ]
      interval: 15s
      timeout: 5s
      retries: 10

  assistant:
    build:
      context: ./Assistant
    restart: unless-stopped
    env_file:
      - .env
    environment:
      TENANT_DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:postgres@db:5432/fastapi_db}
      APP_DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:postgres@db:5432/fastapi_db}
      ASSISTANT_DB_URL: ${ASSISTANT_DB_URL:-postgresql://postgres:postgres@db:5432/fastapi_db}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      ASSISTANT_AUTO_MIGRATE: ${ASSISTANT_AUTO_MIGRATE:-true}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_API_BASE: ${OPENAI_API_BASE:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-}
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "8500"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8500/health', timeout=3)",
        ]
      interval: 15s
      timeout: 5s
      retries: 10

  worker:
    build:
      context: ./Backend
      dockerfile: Dockerfile.prod
    restart: unless-stopped
    command: celery -A app.workers.celery_app.celery_app worker --loglevel=info
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:postgres@db:5432/fastapi_db}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/0}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis:6379/0}
      LOGIN_URL: ${LOGIN_URL:-http://localhost}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost}
      SCHOOL_LOGO_STORAGE_DIR: /tmp/valid8_school_logos
      IMPORT_STORAGE_DIR: /tmp/valid8_imports
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - import_storage:/tmp/valid8_imports
      - branding_storage:/tmp/valid8_school_logos

  beat:
    build:
      context: ./Backend
      dockerfile: Dockerfile.prod
    restart: unless-stopped
    command: celery -A app.workers.celery_app.celery_app beat --loglevel=info --schedule /tmp/celerybeat-schedule
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:postgres@db:5432/fastapi_db}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/0}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis:6379/0}
      LOGIN_URL: ${LOGIN_URL:-http://localhost}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost}
      SCHOOL_LOGO_STORAGE_DIR: /tmp/valid8_school_logos
      IMPORT_STORAGE_DIR: /tmp/valid8_imports
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - import_storage:/tmp/valid8_imports
      - branding_storage:/tmp/valid8_school_logos

  frontend:
    build:
      context: ./Frontend
      dockerfile: Dockerfile.prod
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/__backend__}
        VITE_API_TIMEOUT_MS: ${VITE_API_TIMEOUT_MS:-15000}
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
      assistant:
        condition: service_healthy
    environment:
      BACKEND_ORIGIN: ${BACKEND_ORIGIN:-http://backend:8000}
      ASSISTANT_ORIGIN: ${ASSISTANT_ORIGIN:-http://assistant:8500}
      AURA_API_BASE_URL: ${AURA_API_BASE_URL:-/__backend__}
      AURA_API_TIMEOUT_MS: ${AURA_API_TIMEOUT_MS:-15000}
      AURA_ASSISTANT_BASE_URL: ${AURA_ASSISTANT_BASE_URL:-/__assistant__}
    ports:
      - "${FRONTEND_PORT:-80}:80"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1/"]
      interval: 15s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
  import_storage:
  branding_storage:
