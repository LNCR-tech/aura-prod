services:
  db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: fastapi_db
    ports:
      - "5433:5432"   # changed
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker-init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d fastapi_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "6380:6379"   # changed

  mailpit:
    image: axllent/mailpit:latest
    restart: always
    ports:
      - "1026:1025"   # changed
      - "8026:8025"   # changed
    environment:
      MP_DATA_FILE: /data/mailpit.db
    volumes:
      - mailpit_data:/data

  migrate:
    build:
      context: ./backend
    image: rizal-backend:local
    command: alembic upgrade heads
    env_file:
      - ./.env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/fastapi_db
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  bootstrap:
    image: rizal-backend:local
    command: python bootstrap.py
    env_file:
      - ./.env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/fastapi_db
    volumes:
      - ./backend:/app
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: "no"

  seed:
    image: rizal-backend:local
    command: sh -c "cd /repo/seeder && python seed.py demo"
    env_file:
      - ./.env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/fastapi_db
    volumes:
      - .:/repo
    depends_on:
      bootstrap:
        condition: service_completed_successfully
    restart: "no"

  backend:
    build:
      context: ./backend
    image: rizal-backend:local
    ports:
      - "8001:8000"   # changed
    env_file:
      - ./.env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/fastapi_db
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      LOGIN_URL: http://localhost:5174   # updated
      CORS_ALLOWED_ORIGINS: http://localhost:5174,http://127.0.0.1:5174
      EMAIL_TRANSPORT: ${EMAIL_TRANSPORT:-disabled}
      SMTP_HOST: ${SMTP_HOST:-mailpit}
      SMTP_PORT: ${SMTP_PORT:-1025}
      SMTP_USE_TLS: ${SMTP_USE_TLS:-false}
      SMTP_USE_STARTTLS: ${SMTP_USE_STARTTLS:-false}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      UVICORN_WORKERS: ${UVICORN_WORKERS:-1}
    volumes:
      - ./backend:/app
      - import_storage:/app/storage/imports
      - branding_storage:/app/storage/school_logos
      - insightface_models:/root/.insightface
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      bootstrap:
        condition: service_completed_successfully

  worker:
    build:
      context: ./backend
    image: rizal-backend:local
    command: celery -A app.workers.celery_app.celery_app worker --loglevel=info
    env_file:
      - ./.env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/fastapi_db
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    volumes:
      - ./backend:/app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  beat:
    build:
      context: ./backend
    image: rizal-backend:local
    command: celery -A app.workers.celery_app.celery_app beat --loglevel=info
    env_file:
      - ./.env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/fastapi_db
    volumes:
      - ./backend:/app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  frontend:
    build:
      context: ./frontend
    ports:
      - "5174:180"   # changed
    environment:
      PORT: 180
      BACKEND_ORIGIN: http://localhost:8001   # updated
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  assistant:
    build: ./assistant-v2
    env_file:
      - ./.env
    environment:
      APP_DATABASE_URL: postgresql://postgres:postgres@db:5432/fastapi_db
      ASSISTANT_DB_URL: postgresql://postgres:postgres@db:5432/ai_assistant
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  pgadmin:
    image: dpage/pgadmin4
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5051:80"   # changed
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
  import_storage:
  branding_storage:
  insightface_models:
  mailpit_data:
