services:
  db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: fastapi_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker-init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d fastapi_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "6379:6379"

  mailpit:
    image: axllent/mailpit:latest
    restart: always
    ports:
      - "1025:1025"
      - "8025:8025"
    environment:
      MP_DATA_FILE: /data/mailpit.db
    volumes:
      - mailpit_data:/data

  backend:
    build:
      context: ./Backend
    image: rizal-backend:local
    ports:
      - "8000:8000"
    env_file:
      - ./.env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/fastapi_db
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      LOGIN_URL: http://localhost:5173
      CORS_ALLOWED_ORIGINS: http://localhost:5173,http://127.0.0.1:5173
      EMAIL_TRANSPORT: ${EMAIL_TRANSPORT:-disabled}
      SMTP_HOST: ${SMTP_HOST:-mailpit}
      SMTP_PORT: ${SMTP_PORT:-1025}
      SMTP_USE_TLS: ${SMTP_USE_TLS:-false}
      SMTP_USE_STARTTLS: ${SMTP_USE_STARTTLS:-false}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      UVICORN_WORKERS: ${UVICORN_WORKERS:-1}
    volumes:
      - ./Backend:/app
      - import_storage:/app/storage/imports
      - branding_storage:/app/storage/school_logos
      - insightface_models:/root/.insightface
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/', timeout=5).read()\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  worker:
    build:
      context: ./Backend
    image: rizal-backend:local
    command: celery -A app.workers.celery_app.celery_app worker --loglevel=info
    env_file:
      - ./.env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/fastapi_db
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      LOGIN_URL: http://localhost:5173
      CORS_ALLOWED_ORIGINS: http://localhost:5173,http://127.0.0.1:5173
      EMAIL_TRANSPORT: ${EMAIL_TRANSPORT:-disabled}
      SMTP_HOST: ${SMTP_HOST:-mailpit}
      SMTP_PORT: ${SMTP_PORT:-1025}
      SMTP_USE_TLS: ${SMTP_USE_TLS:-false}
      SMTP_USE_STARTTLS: ${SMTP_USE_STARTTLS:-false}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
    volumes:
      - ./Backend:/app
      - import_storage:/app/storage/imports
      - branding_storage:/app/storage/school_logos
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  beat:
    build:
      context: ./Backend
    image: rizal-backend:local
    command: celery -A app.workers.celery_app.celery_app beat --loglevel=info --schedule /tmp/celerybeat-schedule
    env_file:
      - ./.env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/fastapi_db
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      LOGIN_URL: http://localhost:5173
      CORS_ALLOWED_ORIGINS: http://localhost:5173,http://127.0.0.1:5173
      EMAIL_TRANSPORT: ${EMAIL_TRANSPORT:-disabled}
      SMTP_HOST: ${SMTP_HOST:-mailpit}
      SMTP_PORT: ${SMTP_PORT:-1025}
      SMTP_USE_TLS: ${SMTP_USE_TLS:-false}
      SMTP_USE_STARTTLS: ${SMTP_USE_STARTTLS:-false}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
    volumes:
      - ./Backend:/app
      - import_storage:/app/storage/imports
      - branding_storage:/app/storage/school_logos
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  frontend:
    build:
      context: ./Frontend
    ports:
      - "${FRONTEND_PORT:-5173}:80"
    environment:
      PORT: 80
      BACKEND_ORIGIN: ${BACKEND_ORIGIN:-http://backend:8000}
      ASSISTANT_ORIGIN: ${ASSISTANT_ORIGIN:-http://assistant:8500}
      AURA_API_BASE_URL: ${AURA_API_BASE_URL:-/__backend__}
      AURA_ASSISTANT_BASE_URL: ${AURA_ASSISTANT_BASE_URL:-/__assistant__}
      AURA_API_TIMEOUT_MS: ${AURA_API_TIMEOUT_MS:-15000}
    depends_on:
      backend:
        condition: service_healthy
      assistant:
        condition: service_healthy
    restart: unless-stopped

  assistant:
    build: ./Assistant-v2
    env_file:
      - ./.env
    environment:
      APP_DATABASE_URL: postgresql://postgres:postgres@db:5432/fastapi_db
      ASSISTANT_DB_URL: postgresql://postgres:postgres@db:5432/ai_assistant
      ASSISTANT_AUTO_MIGRATE: "true"
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      BACKEND_API_BASE_URL: http://backend:8000
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8500/health', timeout=5).read()\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 15s



volumes:
  postgres_data:
  import_storage:
  branding_storage:
  insightface_models:
  mailpit_data:
