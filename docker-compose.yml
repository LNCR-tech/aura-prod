# =============================================================================
# Aura — Single Compose File
# Usage:
#   Development:  docker compose --profile dev up --build
#   Production:   docker compose --profile prod up --build
# =============================================================================

x-backend-env: &backend-env
  DATABASE_URL: ${DATABASE_URL}
  CELERY_BROKER_URL: ${CELERY_BROKER_URL}
  CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND}
  SECRET_KEY: ${SECRET_KEY}

x-backend-volumes: &backend-volumes
  - import_storage:/app/storage/imports
  - branding_storage:/app/storage/school_logos
  - insightface_storage:/root/.insightface

services:

  # ---------------------------------------------------------------------------
  # Infrastructure
  # ---------------------------------------------------------------------------

  postgres:
    image: pgvector/pgvector:pg15
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/docker-init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 10
    profiles: ["dev", "prod"]

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    profiles: ["dev", "prod"]

  # ---------------------------------------------------------------------------
  # Init jobs — run once in order, then exit
  # ---------------------------------------------------------------------------

  migrate:
    build:
      context: ./backend
      dockerfile: ${DOCKERFILE:-Dockerfile}
    image: aura-backend:${APP_ENV:-dev}
    command: alembic upgrade heads
    environment:
      <<: *backend-env
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"
    profiles: ["dev", "prod"]

  bootstrap:
    image: aura-backend:${APP_ENV:-dev}
    command: python bootstrap.py
    environment:
      <<: *backend-env
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: "no"
    profiles: ["dev", "prod"]

  seeder:
    build:
      context: ./seeder
    image: aura-seeder:${APP_ENV:-dev}
    environment:
      DATABASE_URL: ${DATABASE_URL}
      SEED_DATABASE: ${SEED_DATABASE:-false}
      SEED_CONFIRM: ${SEED_CONFIRM:-}
      SEED_WIPE_EXISTING: ${SEED_WIPE_EXISTING:-true}
    depends_on:
      bootstrap:
        condition: service_completed_successfully
    restart: "no"
    profiles: ["dev", "prod"]

  # ---------------------------------------------------------------------------
  # Application services
  # ---------------------------------------------------------------------------

  backend:
    image: aura-backend:${APP_ENV:-dev}
    ports:
      - "8000:8000"
    env_file:
      - ./.env
    environment:
      <<: *backend-env
      UVICORN_WORKERS: ${UVICORN_WORKERS:-1}
    volumes: *backend-volumes
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      bootstrap:
        condition: service_completed_successfully
    profiles: ["dev", "prod"]

  worker:
    image: aura-backend:${APP_ENV:-dev}
    command: celery -A app.workers.celery_app.celery_app worker --loglevel=info --concurrency=4
    env_file:
      - ./.env
    environment:
      <<: *backend-env
    volumes: *backend-volumes
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    profiles: ["dev", "prod"]

  beat:
    image: aura-backend:${APP_ENV:-dev}
    command: celery -A app.workers.celery_app.celery_app beat --loglevel=info
    env_file:
      - ./.env
    environment:
      <<: *backend-env
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    profiles: ["dev", "prod"]

  assistant:
    build: ./assistant
    image: aura-assistant:${APP_ENV:-dev}
    ports:
      - "8500:8500"
    env_file:
      - ./.env
    environment:
      APP_DATABASE_URL: ${DATABASE_URL}
      ASSISTANT_DB_URL: ${ASSISTANT_DB_URL}
      SECRET_KEY: ${SECRET_KEY}
      AI_API_KEY: ${AI_API_KEY}
      AI_API_BASE: ${AI_API_BASE}
      AI_MODEL: ${AI_MODEL}
      BACKEND_API_BASE_URL: ${BACKEND_API_BASE_URL}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    profiles: ["dev", "prod"]

  frontend:
    build:
      context: ./frontend
    image: aura-frontend:${APP_ENV:-dev}
    ports:
      - "${FRONTEND_PORT:-80}:80"
    environment:
      BACKEND_ORIGIN: ${BACKEND_ORIGIN}
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    profiles: ["dev", "prod"]

  # ---------------------------------------------------------------------------
  # Dev-only services
  # ---------------------------------------------------------------------------

  pgadmin:
    image: dpage/pgadmin4
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@aura.local}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-changeme}
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      postgres:
        condition: service_healthy
    profiles: ["dev"]

  mailpit:
    image: axllent/mailpit
    restart: unless-stopped
    ports:
      - "8025:8025"
      - "1025:1025"
    profiles: ["dev"]

volumes:
  postgres_data:
  import_storage:
  branding_storage:
  insightface_storage:
  pgadmin_data:
