services:
  db:
    image: postgres:15
    container_name: postgres-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: fastapi_db
    ports:
      # Expose Postgres on 5433 to avoid conflicts with any local Windows PostgreSQL service.
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: valid8-redis
    restart: always
    ports:
      - "6379:6379"

  backend:
    build: ./Backend
    container_name: backend_v2
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/fastapi_db
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - AUTH_ENABLE_MFA=false
      - ALLOW_LIVENESS_BYPASS_WHEN_MODEL_MISSING=false
      - LOGIN_URL=http://localhost:5173
      - CORS_ALLOWED_ORIGINS=http://localhost:5173,http://127.0.0.1:5173
      - EVENT_STATUS_SYNC_ENABLED=${EVENT_STATUS_SYNC_ENABLED:-true}
      - EVENT_STATUS_SYNC_INTERVAL_SECONDS=${EVENT_STATUS_SYNC_INTERVAL_SECONDS:-60}
      - EMAIL_TRANSPORT=${EMAIL_TRANSPORT:-disabled}
      - EMAIL_TIMEOUT_SECONDS=${EMAIL_TIMEOUT_SECONDS:-20}
      - EMAIL_SENDER_EMAIL=${EMAIL_SENDER_EMAIL:-}
      - EMAIL_FROM_EMAIL=${EMAIL_FROM_EMAIL:-noreply@valid8.dev}
      - EMAIL_FROM_NAME=${EMAIL_FROM_NAME:-VALID8 Notifications}
      - EMAIL_REPLY_TO=${EMAIL_REPLY_TO:-}
      - EMAIL_GOOGLE_ACCOUNT_TYPE=${EMAIL_GOOGLE_ACCOUNT_TYPE:-auto}
      - EMAIL_GOOGLE_ALLOW_CUSTOM_FROM=${EMAIL_GOOGLE_ALLOW_CUSTOM_FROM:-false}
      - GOOGLE_GMAIL_API_BASE_URL=${GOOGLE_GMAIL_API_BASE_URL:-https://gmail.googleapis.com/gmail/v1}
      - GOOGLE_OAUTH_AUTH_URL=${GOOGLE_OAUTH_AUTH_URL:-https://accounts.google.com/o/oauth2/v2/auth}
      - GOOGLE_OAUTH_TOKEN_URL=${GOOGLE_OAUTH_TOKEN_URL:-https://oauth2.googleapis.com/token}
      - GOOGLE_OAUTH_CLIENT_ID=${GOOGLE_OAUTH_CLIENT_ID:-}
      - GOOGLE_OAUTH_CLIENT_SECRET=${GOOGLE_OAUTH_CLIENT_SECRET:-}
      - GOOGLE_OAUTH_REFRESH_TOKEN=${GOOGLE_OAUTH_REFRESH_TOKEN:-}
      - GOOGLE_OAUTH_SCOPES=${GOOGLE_OAUTH_SCOPES:-https://www.googleapis.com/auth/gmail.send,https://www.googleapis.com/auth/gmail.settings.basic}
      - SCHOOL_LOGO_STORAGE_DIR=/tmp/valid8_school_logos
      - SCHOOL_LOGO_MAX_FILE_SIZE_MB=2
    volumes:
      - ./Backend:/app
      - import_storage:/tmp/valid8_imports
      - branding_storage:/tmp/valid8_school_logos
    restart: unless-stopped
    depends_on:
      - db
      - redis

  worker:
    build: ./Backend
    container_name: backend_worker_v2
    command: celery -A app.workers.celery_app.celery_app worker --loglevel=info
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/fastapi_db
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - AUTH_ENABLE_MFA=false
      - ALLOW_LIVENESS_BYPASS_WHEN_MODEL_MISSING=false
      - LOGIN_URL=http://localhost:5173
      - CORS_ALLOWED_ORIGINS=http://localhost:5173,http://127.0.0.1:5173
      - EVENT_STATUS_SYNC_ENABLED=${EVENT_STATUS_SYNC_ENABLED:-true}
      - EVENT_STATUS_SYNC_INTERVAL_SECONDS=${EVENT_STATUS_SYNC_INTERVAL_SECONDS:-60}
      - EMAIL_TRANSPORT=${EMAIL_TRANSPORT:-disabled}
      - EMAIL_TIMEOUT_SECONDS=${EMAIL_TIMEOUT_SECONDS:-20}
      - EMAIL_SENDER_EMAIL=${EMAIL_SENDER_EMAIL:-}
      - EMAIL_FROM_EMAIL=${EMAIL_FROM_EMAIL:-noreply@valid8.dev}
      - EMAIL_FROM_NAME=${EMAIL_FROM_NAME:-VALID8 Notifications}
      - EMAIL_REPLY_TO=${EMAIL_REPLY_TO:-}
      - EMAIL_GOOGLE_ACCOUNT_TYPE=${EMAIL_GOOGLE_ACCOUNT_TYPE:-auto}
      - EMAIL_GOOGLE_ALLOW_CUSTOM_FROM=${EMAIL_GOOGLE_ALLOW_CUSTOM_FROM:-false}
      - GOOGLE_GMAIL_API_BASE_URL=${GOOGLE_GMAIL_API_BASE_URL:-https://gmail.googleapis.com/gmail/v1}
      - GOOGLE_OAUTH_AUTH_URL=${GOOGLE_OAUTH_AUTH_URL:-https://accounts.google.com/o/oauth2/v2/auth}
      - GOOGLE_OAUTH_TOKEN_URL=${GOOGLE_OAUTH_TOKEN_URL:-https://oauth2.googleapis.com/token}
      - GOOGLE_OAUTH_CLIENT_ID=${GOOGLE_OAUTH_CLIENT_ID:-}
      - GOOGLE_OAUTH_CLIENT_SECRET=${GOOGLE_OAUTH_CLIENT_SECRET:-}
      - GOOGLE_OAUTH_REFRESH_TOKEN=${GOOGLE_OAUTH_REFRESH_TOKEN:-}
      - GOOGLE_OAUTH_SCOPES=${GOOGLE_OAUTH_SCOPES:-https://www.googleapis.com/auth/gmail.send,https://www.googleapis.com/auth/gmail.settings.basic}
      - SCHOOL_LOGO_STORAGE_DIR=/tmp/valid8_school_logos
      - SCHOOL_LOGO_MAX_FILE_SIZE_MB=2
    volumes:
      - ./Backend:/app
      - import_storage:/tmp/valid8_imports
      - branding_storage:/tmp/valid8_school_logos
    restart: unless-stopped
    depends_on:
      - db
      - redis

  beat:
    build: ./Backend
    container_name: backend_beat_v2
    command: celery -A app.workers.celery_app.celery_app beat --loglevel=info --schedule /tmp/celerybeat-schedule
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/fastapi_db
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - AUTH_ENABLE_MFA=false
      - ALLOW_LIVENESS_BYPASS_WHEN_MODEL_MISSING=false
      - LOGIN_URL=http://localhost:5173
      - CORS_ALLOWED_ORIGINS=http://localhost:5173,http://127.0.0.1:5173
      - EVENT_STATUS_SYNC_ENABLED=${EVENT_STATUS_SYNC_ENABLED:-true}
      - EVENT_STATUS_SYNC_INTERVAL_SECONDS=${EVENT_STATUS_SYNC_INTERVAL_SECONDS:-60}
      - EMAIL_TRANSPORT=${EMAIL_TRANSPORT:-disabled}
      - EMAIL_TIMEOUT_SECONDS=${EMAIL_TIMEOUT_SECONDS:-20}
      - EMAIL_SENDER_EMAIL=${EMAIL_SENDER_EMAIL:-}
      - EMAIL_FROM_EMAIL=${EMAIL_FROM_EMAIL:-noreply@valid8.dev}
      - EMAIL_FROM_NAME=${EMAIL_FROM_NAME:-VALID8 Notifications}
      - EMAIL_REPLY_TO=${EMAIL_REPLY_TO:-}
      - EMAIL_GOOGLE_ACCOUNT_TYPE=${EMAIL_GOOGLE_ACCOUNT_TYPE:-auto}
      - EMAIL_GOOGLE_ALLOW_CUSTOM_FROM=${EMAIL_GOOGLE_ALLOW_CUSTOM_FROM:-false}
      - GOOGLE_GMAIL_API_BASE_URL=${GOOGLE_GMAIL_API_BASE_URL:-https://gmail.googleapis.com/gmail/v1}
      - GOOGLE_OAUTH_AUTH_URL=${GOOGLE_OAUTH_AUTH_URL:-https://accounts.google.com/o/oauth2/v2/auth}
      - GOOGLE_OAUTH_TOKEN_URL=${GOOGLE_OAUTH_TOKEN_URL:-https://oauth2.googleapis.com/token}
      - GOOGLE_OAUTH_CLIENT_ID=${GOOGLE_OAUTH_CLIENT_ID:-}
      - GOOGLE_OAUTH_CLIENT_SECRET=${GOOGLE_OAUTH_CLIENT_SECRET:-}
      - GOOGLE_OAUTH_REFRESH_TOKEN=${GOOGLE_OAUTH_REFRESH_TOKEN:-}
      - GOOGLE_OAUTH_SCOPES=${GOOGLE_OAUTH_SCOPES:-https://www.googleapis.com/auth/gmail.send,https://www.googleapis.com/auth/gmail.settings.basic}
      - SCHOOL_LOGO_STORAGE_DIR=/tmp/valid8_school_logos
      - SCHOOL_LOGO_MAX_FILE_SIZE_MB=2
    volumes:
      - ./Backend:/app
      - import_storage:/tmp/valid8_imports
      - branding_storage:/tmp/valid8_school_logos
    restart: unless-stopped
    depends_on:
      - db
      - redis

  frontend:
    build: ./Frontend
    container_name: frontend_v2
    ports:
      - "5173:5173"
    depends_on:
      - backend
    working_dir: /app
    volumes:
      - ./Frontend:/app
      - /app/node_modules
    command: sh /app/scripts/dev-entrypoint.sh
    restart: unless-stopped

  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    depends_on:
      - db

volumes:
  postgres_data:
  import_storage:
  branding_storage:
