# =============================================================================
# Aura — Single Compose File
# Usage:
#   Development:  docker compose --profile dev up --build
#   Production:   docker compose --profile prod up --build
#
# Each service loads its own .env file from its subfolder.
# Copy each service's .env.example to .env and fill in the values before running.
# =============================================================================

x-backend-volumes: &backend-volumes
  - import_storage:/app/storage/imports
  - branding_storage:/app/storage/school_logos
  - insightface_storage:/root/.insightface

services:

  # ---------------------------------------------------------------------------
  # Infrastructure
  # ---------------------------------------------------------------------------

  postgres:
    build:
      context: ./database
    image: aura-postgres:latest
    restart: unless-stopped
    env_file:
      - ./database/.env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 10
    profiles: ["dev", "prod"]

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    profiles: ["dev", "prod"]

  # ---------------------------------------------------------------------------
  # Init jobs — run once in order, then exit
  # ---------------------------------------------------------------------------

  migrate:
    build:
      context: ./backend
      dockerfile: ${DOCKERFILE:-Dockerfile}
    image: aura-backend:${APP_ENV:-dev}
    command: alembic upgrade heads
    env_file:
      - ./backend/.env
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"
    profiles: ["dev", "prod"]

  bootstrap:
    image: aura-backend:${APP_ENV:-dev}
    command: python bootstrap.py
    env_file:
      - ./backend/.env
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: "no"
    profiles: ["dev", "prod"]

  seeder:
    build:
      context: ./seeder
    image: aura-seeder:${APP_ENV:-dev}
    env_file:
      - ./seeder/.env
    depends_on:
      bootstrap:
        condition: service_completed_successfully
    restart: "no"
    profiles: ["dev", "prod"]

  # ---------------------------------------------------------------------------
  # Application services
  # ---------------------------------------------------------------------------

  backend:
    image: aura-backend:${APP_ENV:-dev}
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    volumes: *backend-volumes
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      bootstrap:
        condition: service_completed_successfully
    profiles: ["dev", "prod"]

  worker:
    image: aura-backend:${APP_ENV:-dev}
    command: celery -A app.workers.celery_app.celery_app worker --loglevel=info --concurrency=4
    env_file:
      - ./backend/.env
    volumes: *backend-volumes
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    profiles: ["dev", "prod"]

  beat:
    image: aura-backend:${APP_ENV:-dev}
    command: celery -A app.workers.celery_app.celery_app beat --loglevel=info
    env_file:
      - ./backend/.env
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    profiles: ["dev", "prod"]

  assistant:
    build: ./assistant
    image: aura-assistant:${APP_ENV:-dev}
    ports:
      - "8500:8500"
    env_file:
      - ./assistant/.env
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    profiles: ["dev", "prod"]

  frontend:
    build:
      context: ./frontend
    image: aura-frontend:${APP_ENV:-dev}
    ports:
      - "80:80"
    env_file:
      - ./frontend/.env
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    profiles: ["dev", "prod"]

  # ---------------------------------------------------------------------------
  # Dev-only services
  # ---------------------------------------------------------------------------

  pgadmin:
    image: dpage/pgadmin4
    restart: unless-stopped
    env_file:
      - ./database/.env
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      postgres:
        condition: service_healthy
    profiles: ["dev"]

  mailpit:
    image: axllent/mailpit
    restart: unless-stopped
    ports:
      - "8025:8025"
      - "1025:1025"
    profiles: ["dev"]

volumes:
  postgres_data:
  import_storage:
  branding_storage:
  insightface_storage:
  pgadmin_data:
