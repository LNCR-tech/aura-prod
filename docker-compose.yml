# =============================================================================
# Aura — Production Compose
# Zero-config: docker compose up --build -d
# All services start automatically in the correct order.
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # Infrastructure
  # ---------------------------------------------------------------------------

  postgres:
    image: pgvector/pgvector:pg15
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/docker-init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "6379:6379"

  # ---------------------------------------------------------------------------
  # Init jobs — run once in order, then exit
  # ---------------------------------------------------------------------------

  migrate:
    build:
      context: ./backend
    image: aura-backend:production
    command: alembic upgrade heads
    environment:
      DATABASE_URL: ${DATABASE_URL}
      SECRET_KEY: ${SECRET_KEY}
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  bootstrap:
    image: aura-backend:production
    command: python bootstrap.py
    environment:
      DATABASE_URL: ${DATABASE_URL}
      SECRET_KEY: ${SECRET_KEY}
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: "no"

  # ---------------------------------------------------------------------------
  # Application services
  # ---------------------------------------------------------------------------

  backend:
    image: aura-backend:production
    ports:
      - "8000:8000"
    env_file:
      - ./.env
    environment:
      DATABASE_URL: ${DATABASE_URL}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND}
      SECRET_KEY: ${SECRET_KEY}
      REDIS_URL: redis://redis:6379/0
      LOGIN_URL: ${LOGIN_URL}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      EMAIL_TRANSPORT: ${EMAIL_TRANSPORT}
      EMAIL_SENDER_EMAIL: ${EMAIL_SENDER_EMAIL}
      EMAIL_SENDER_NAME: ${EMAIL_SENDER_NAME}
      EMAIL_REPLY_TO: ${EMAIL_REPLY_TO}
      MAILJET_API_KEY: ${MAILJET_API_KEY}
      MAILJET_API_SECRET: ${MAILJET_API_SECRET}
      UVICORN_WORKERS: ${UVICORN_WORKERS:-4}
    volumes:
      - import_storage:/app/storage/imports
      - branding_storage:/app/storage/school_logos
      - insightface_storage:/root/.insightface
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      bootstrap:
        condition: service_completed_successfully

  worker:
    image: aura-backend:production
    command: celery -A app.workers.celery_app.celery_app worker --loglevel=info --concurrency=4
    env_file:
      - ./.env
    environment:
      DATABASE_URL: ${DATABASE_URL}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND}
      SECRET_KEY: ${SECRET_KEY}
    volumes:
      - import_storage:/app/storage/imports
      - branding_storage:/app/storage/school_logos
      - insightface_storage:/root/.insightface
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  beat:
    image: aura-backend:production
    command: celery -A app.workers.celery_app.celery_app beat --loglevel=info
    env_file:
      - ./.env
    environment:
      DATABASE_URL: ${DATABASE_URL}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND}
      SECRET_KEY: ${SECRET_KEY}
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  assistant:
    build: ./assistant
    image: aura-assistant:production
    ports:
      - "8500:8500"
    env_file:
      - ./.env
    environment:
      APP_DATABASE_URL: ${DATABASE_URL}
      ASSISTANT_DB_URL: ${ASSISTANT_DB_URL}
      SECRET_KEY: ${SECRET_KEY}
      AI_API_KEY: ${AI_API_KEY}
      AI_API_BASE: ${AI_API_BASE}
      AI_MODEL: ${AI_MODEL}
      BACKEND_API_BASE_URL: ${BACKEND_API_BASE_URL}
    depends_on:
      postgres:
        condition: service_healthy
    restart: always

  frontend:
    build:
      context: ./frontend
    image: aura-frontend:production
    ports:
      - "${FRONTEND_PORT:-80}:80"
    environment:
      BACKEND_ORIGIN: ${BACKEND_ORIGIN}
    depends_on:
      backend:
        condition: service_healthy
    restart: always

  pgadmin:
    image: dpage/pgadmin4
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@aura.local}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-changeme}
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  import_storage:
  branding_storage:
  insightface_storage:
  pgadmin_data:
