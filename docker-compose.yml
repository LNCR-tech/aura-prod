# =============================================================================
# Aura — Local Development Compose
# Zero-config: docker compose up --build  is all you need.
# All services start automatically in the correct order.
# Seeder runs only when SEED_DATABASE=True in seeder/variables.py.
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # Infrastructure
  # ---------------------------------------------------------------------------

  db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: fastapi_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker-init:/docker-entrypoint-initdb.d   # creates ai_assistant DB
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d fastapi_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "6380:6379"

  mailpit:
    image: axllent/mailpit:latest
    restart: always
    ports:
      - "1026:1025"
      - "8025:8025"
    environment:
      MP_DATA_FILE: /data/mailpit.db
    volumes:
      - mailpit_data:/data

  # ---------------------------------------------------------------------------
  # Init jobs — run once in order, then exit
  # ---------------------------------------------------------------------------

  migrate:
    build:
      context: ./backend
    image: aura-backend:local
    command: alembic upgrade heads
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/fastapi_db
      SECRET_KEY: local-dev-secret
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  bootstrap:
    image: aura-backend:local
    command: python bootstrap.py
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/fastapi_db
      SECRET_KEY: local-dev-secret
    volumes:
      - ./backend:/app
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: "no"

  seed:
    image: aura-backend:local
    command: sh -c "cd /repo/seeder && python seed.py demo"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/fastapi_db
      SECRET_KEY: local-dev-secret
    volumes:
      - .:/repo
    depends_on:
      bootstrap:
        condition: service_completed_successfully
    restart: "no"

  # ---------------------------------------------------------------------------
  # Application services
  # ---------------------------------------------------------------------------

  backend:
    image: aura-backend:local
    ports:
      - "8001:8000"
    env_file:
      - ./.env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/fastapi_db
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-local-dev-secret}
      LOGIN_URL: http://localhost:5173
      CORS_ALLOWED_ORIGINS: http://localhost:5173,http://127.0.0.1:5173
      EMAIL_TRANSPORT: ${EMAIL_TRANSPORT:-disabled}
      SMTP_HOST: ${SMTP_HOST:-mailpit}
      SMTP_PORT: ${SMTP_PORT:-1025}
      SMTP_USE_TLS: ${SMTP_USE_TLS:-false}
      SMTP_USE_STARTTLS: ${SMTP_USE_STARTTLS:-false}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      UVICORN_WORKERS: ${UVICORN_WORKERS:-1}
    volumes:
      - ./backend:/app
      - import_storage:/app/storage/imports
      - branding_storage:/app/storage/school_logos
      - insightface_models:/root/.insightface
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      seed:
        condition: service_completed_successfully

  worker:
    image: aura-backend:local
    command: celery -A app.workers.celery_app.celery_app worker --loglevel=info
    env_file:
      - ./.env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/fastapi_db
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-local-dev-secret}
    volumes:
      - ./backend:/app
      - import_storage:/app/storage/imports
      - branding_storage:/app/storage/school_logos
      - insightface_models:/root/.insightface
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  beat:
    image: aura-backend:local
    command: celery -A app.workers.celery_app.celery_app beat --loglevel=info
    env_file:
      - ./.env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/fastapi_db
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-local-dev-secret}
    volumes:
      - ./backend:/app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  assistant:
    build: ./assistant-v2
    image: aura-assistant:local
    ports:
      - "8500:8500"
    env_file:
      - ./.env
    environment:
      APP_DATABASE_URL: postgresql://postgres:postgres@db:5432/fastapi_db
      ASSISTANT_DB_URL: postgresql://postgres:postgres@db:5432/ai_assistant
      SECRET_KEY: ${SECRET_KEY:-local-dev-secret}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    image: aura-frontend:local
    ports:
      - "5173:80"
    environment:
      BACKEND_ORIGIN: http://backend:8000
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  pgadmin:
    image: dpage/pgadmin4
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    volumes:
      - /home/ubuntu/Aura/docker-data/pgadmin:/var/lib/pgadmin
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
  import_storage:
  branding_storage:
  insightface_models:
  mailpit_data:
