apply plugin: 'com.android.application'

def resolveConfigValue(String key, String fallback = '') {
    def propertyValue = findProperty(key)
    if (propertyValue != null && String.valueOf(propertyValue).trim()) {
        return String.valueOf(propertyValue).trim()
    }

    def envValue = System.getenv(key)
    if (envValue != null && String.valueOf(envValue).trim()) {
        return String.valueOf(envValue).trim()
    }

    return fallback
}

def resolveIntConfigValue(String key, int fallback) {
    def configuredValue = resolveConfigValue(key, '')
    if (!configuredValue) return fallback

    try {
        def parsed = Integer.parseInt(configuredValue)
        return parsed > 0 ? parsed : fallback
    } catch (Exception ignored) {
        return fallback
    }
}

def releaseKeystorePath = resolveConfigValue('AURA_ANDROID_KEYSTORE_PATH', '')
def releaseKeystorePassword = resolveConfigValue('AURA_ANDROID_KEYSTORE_PASSWORD', '')
def releaseKeyAlias = resolveConfigValue('AURA_ANDROID_KEY_ALIAS', '')
def releaseKeyPassword = resolveConfigValue('AURA_ANDROID_KEY_PASSWORD', '')
def hasCustomReleaseSigning = releaseKeystorePath && releaseKeystorePassword && releaseKeyAlias && releaseKeyPassword

if (!hasCustomReleaseSigning) {
    logger.lifecycle('Aura Android release builds are using the debug signing key for pilot testing. Set AURA_ANDROID_KEYSTORE_PATH, AURA_ANDROID_KEYSTORE_PASSWORD, AURA_ANDROID_KEY_ALIAS, and AURA_ANDROID_KEY_PASSWORD for production signing.')
}

android {
    namespace = "com.aura.app"
    compileSdk = rootProject.ext.compileSdkVersion
    signingConfigs {
        release {
            if (hasCustomReleaseSigning) {
                storeFile file(releaseKeystorePath)
                storePassword releaseKeystorePassword
                keyAlias releaseKeyAlias
                keyPassword releaseKeyPassword
            }
        }
    }
    defaultConfig {
        applicationId "com.aura.app"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode resolveIntConfigValue('AURA_ANDROID_VERSION_CODE', 10300)
        versionName resolveConfigValue('AURA_ANDROID_VERSION_NAME', '1.3.0')
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        aaptOptions {
             // Files and dirs to omit from the packaged assets dir, modified to accommodate modern web apps.
             // Default: https://android.googlesource.com/platform/frameworks/base/+/282e181b58cf72b6ca770dc7ca5f91f135444502/tools/aapt/AaptAssets.cpp#61
            ignoreAssetsPattern = '!.svn:!.git:!.ds_store:!*.scc:.*:!CVS:!thumbs.db:!picasa.ini:!*~'
        }
    }
    buildTypes {
        release {
            minifyEnabled true
            shrinkResources true
            signingConfig hasCustomReleaseSigning ? signingConfigs.release : signingConfigs.debug
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
        }
    }
}

repositories {
    flatDir{
        dirs '../capacitor-cordova-android-plugins/src/main/libs', 'libs'
    }
}

dependencies {
    implementation fileTree(include: ['*.jar'], dir: 'libs')
    implementation "androidx.appcompat:appcompat:$androidxAppCompatVersion"
    implementation "androidx.coordinatorlayout:coordinatorlayout:$androidxCoordinatorLayoutVersion"
    implementation "androidx.core:core-splashscreen:$coreSplashScreenVersion"
    implementation project(':capacitor-android')
    testImplementation "junit:junit:$junitVersion"
    androidTestImplementation "androidx.test.ext:junit:$androidxJunitVersion"
    androidTestImplementation "androidx.test.espresso:espresso-core:$androidxEspressoCoreVersion"
    implementation project(':capacitor-cordova-android-plugins')
}

apply from: 'capacitor.build.gradle'

try {
    def servicesJSON = file('google-services.json')
    if (servicesJSON.text) {
        apply plugin: 'com.google.gms.google-services'
    }
} catch(Exception e) {
    logger.info("google-services.json not found, google-services plugin not applied. Push Notifications won't work")
}
